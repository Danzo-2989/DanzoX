<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANZO ADMIN - V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010a01; color: white; font-family: 'Segoe UI', sans-serif; }
        .neon-border { border: 1px solid #22c55e; box-shadow: 0 0 10px rgba(34,197,94,0.2); }
        .status-pending { color: #eab308; background: rgba(234,179,8,0.1); border: 1px solid #eab308; }
        .status-success { color: #22c55e; background: rgba(34,197,94,0.1); border: 1px solid #22c55e; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 bg-black/50 p-6 rounded-2xl neon-border">
            <div>
                <h1 class="text-3xl font-black italic text-green-500 tracking-tighter">DANZO CONTROL PANEL</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em]">Monitoring Jualan Cheat & Premium</p>
            </div>
            <div class="flex gap-3">
                <button onclick="resetData()" class="bg-red-600/20 text-red-500 border border-red-600 px-4 py-2 rounded-lg text-[10px] font-bold uppercase hover:bg-red-600 hover:text-white transition">
                    Reset Database
                </button>
            </div>
        </div>

        <div id="pancingan-info" class="hidden mb-6 p-4 bg-blue-500/10 border border-blue-500 rounded-xl text-center text-blue-400 text-xs">
            Database kosong! Coba lakukan transaksi tes di web utama biar data muncul di sini.
        </div>

        <div id="admin-container" class="grid gap-4">
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-green-500 mb-4"></div>
                <p class="text-gray-500 text-xs uppercase tracking-widest">Menghubungkan ke Firebase...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // CONFIG KAMU
        const firebaseConfig = {
            apiKey: "AIzaSyDNZ8Z7oeVLKAejZXlOR4C3g5KtiuyhMnY",
            authDomain: "danzo-store.firebaseapp.com",
            databaseURL: "https://danzo-store-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "danzo-store",
            storageBucket: "danzo-store.firebasestorage.app",
            messagingSenderId: "148052191960",
            appId: "1:148052191960:web:c0b1552674dcfccbddc5ad"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // AMBIL DATA
        const transRef = ref(db, 'transactions');
        onValue(transRef, (snapshot) => {
            const container = document.getElementById('admin-container');
            const info = document.getElementById('pancingan-info');
            container.innerHTML = "";

            if (!snapshot.exists()) {
                info.classList.remove('hidden');
                container.innerHTML = `
                    <div class="text-center py-20 border-2 border-dashed border-gray-800 rounded-3xl">
                        <p class="text-gray-600 uppercase text-xs font-bold tracking-widest">KOSONGAN (NULL)</p>
                    </div>`;
                return;
            }

            info.classList.add('hidden');
            let data = [];
            snapshot.forEach(child => {
                data.push({ id: child.key, ...child.val() });
            });

            data.reverse().forEach(item => {
                const statusClass = item.status === 'SUCCESS' ? 'status-success' : 'status-pending';
                container.innerHTML += `
                    <div class="bg-black border border-gray-900 p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-6 hover:border-green-500/50 transition duration-300">
                        <div class="text-center md:text-left">
                            <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">${item.product}</span>
                            <h3 class="text-2xl font-black text-white italic uppercase">${item.username}</h3>
                            <div class="mt-2">
                                <span class="px-3 py-1 rounded-full text-[9px] font-bold uppercase ${statusClass}">
                                    ${item.status}
                                </span>
                            </div>
                        </div>
                        <div class="flex gap-3 w-full md:w-auto">
                            <button onclick="approve('${item.id}')" class="flex-1 bg-green-500 text-black font-black text-[10px] px-6 py-3 rounded-xl uppercase hover:scale-105 active:scale-95 transition">
                                ACC SUCCESS
                            </button>
                            <button onclick="hapus('${item.id}')" class="bg-white/5 text-gray-500 px-4 py-3 rounded-xl text-[10px] font-bold uppercase hover:bg-red-600 hover:text-white transition">
                                Hapus
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        // FUNGSI ACC
        window.approve = (id) => {
            const itemRef = ref(db, `transactions/${id}`);
            update(itemRef, { status: "SUCCESS" });
        };

        // FUNGSI HAPUS SATU
        window.hapus = (id) => {
            if(confirm("Hapus data ini?")) {
                remove(ref(db, `transactions/${id}`));
            }
        };

        // FUNGSI RESET SEMUA
        window.resetData = () => {
            if(confirm("HAPUS SEMUA DATABASE?")) {
                remove(ref(db, 'transactions'));
            }
        };
    </script>
</body>
</html>
